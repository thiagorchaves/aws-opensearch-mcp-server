profiles:
  allowed:
    - ci
    - qa
    - prod
    - telemetry

  # Optional per-profile role assumption. Leave role_arn absent to use the profile directly.
  settings:
    ci:
      read_only: true
    qa:
      read_only: true
    prod:
      read_only: true
    telemetry:
      read_only: true
      # role_arn: arn:aws:iam::123456789012:role/OpenSearchReadOnlyMcp
      # external_id: optional-external-id

regions:
  allowed:
    - us-east-1
    - us-east-2

limits:
  max_documents: 100
  max_query_bytes: 100000
  max_response_bytes: 2000000
  request_timeout_seconds: 20
  max_lookback_hours: 744
  max_cat_rows: 5000

# Matching is case-insensitive and substring-aware.
redact_fields:
  - authorization
  - password
  - passwd
  - secret
  - secret_key
  - access_key
  - api_key
  - token
  - refresh_token
  - session_token
  - cookie
  - set-cookie
